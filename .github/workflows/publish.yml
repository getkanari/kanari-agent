name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  # Gate: run tests before publishing
  test:
    name: Test before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.5
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run tests
        run: poetry run pytest --cov=doorman_agent --cov-fail-under=80

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi  # requires manual approval in GitHub repo settings

    permissions:
      id-token: write  # required for trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.5
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(poetry version --short)
          if [ "$TAG" != "$PKG" ]; then
            echo "❌ Tag $TAG does not match package version $PKG"
            exit 1
          fi
          echo "✅ Tag matches package version: $PKG"

      - name: Build package
        run: poetry build

      - name: Inspect built artifacts
        run: |
          ls -lh dist/
          python -m zipfile -l dist/*.whl | head -20

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
